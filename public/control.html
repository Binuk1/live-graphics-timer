<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">
    <link rel="shortcut icon" href="/favicon.ico">
    <title>Timer Control Panel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #1a1a1a;
            color: #fff;
            height: 100vh;
            height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .control-panel {
            background: #2a2a2a;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            text-align: center;
            width: 100%;
            max-width: 500px;
            margin: 20px;
        }

        .panel-title {
            font-size: 24px;
            margin-bottom: 30px;
            color: #fff;
        }

        .timer-preview {
            font-size: 60px;
            font-weight: bold;
            margin-bottom: 30px;
            font-family: 'Arial', sans-serif;
            color: #fff;
        }

        .timer-preview.running {
            color: #ff0000;
        }

        .time-inputs {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-bottom: 30px;
        }

        .time-input {
            width: 80px;
            padding: 15px;
            font-size: 24px;
            font-family: 'Arial', sans-serif;
            font-weight: bold;
            text-align: center;
            background: #3a3a3a;
            border: 2px solid #555;
            color: #fff;
            border-radius: 5px;
        }

        .time-input:focus {
            outline: none;
            border-color: #007bff;
        }

        .time-separator {
            font-size: 30px;
            color: #fff;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .btn {
            padding: 20px 40px;
            font-size: 18px;
            font-family: 'Arial', sans-serif;
            font-weight: bold;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            border-radius: 5px;
            transition: all 0.3s ease;
        }

        .btn-start {
            background: #28a745;
            color: #fff;
        }

        .btn-start:hover {
            background: #218838;
        }

        .btn-stop {
            background: #dc3545;
            color: #fff;
        }

        .btn-stop:hover {
            background: #c82333;
        }

        .btn-reset {
            background: #ffc107;
            color: #000;
        }

        .btn-reset:hover {
            background: #e0a800;
        }

        .btn-set {
            background: #007bff;
            color: #fff;
        }

        .btn-set:hover {
            background: #0069d9;
        }

        .status {
            margin-top: 20px;
            font-size: 18px;
            color: #aaa;
        }

        /* Tablet responsive */
        @media (max-width: 768px) {
            .control-panel {
                padding: 30px;
                width: 90%;
                max-width: 500px;
            }

            .panel-title {
                font-size: 20px;
                margin-bottom: 25px;
            }

            .timer-preview {
                font-size: 50px;
                margin-bottom: 25px;
            }

            .time-input {
                width: 70px;
                padding: 12px;
                font-size: 20px;
            }

            .time-separator {
                font-size: 24px;
            }

            .btn {
                padding: 15px 30px;
                font-size: 16px;
            }

            .status {
                font-size: 16px;
            }
        }

        /* Mobile responsive */
        @media (max-width: 480px) {
            body {
                padding: 0;
            }

            .control-panel {
                padding: 24px;
                width: 100%;
                max-width: none;
                border-radius: 0;
                height: 100vh;
                height: 100dvh;
                display: flex;
                flex-direction: column;
                justify-content: center;
                margin: 0;
            }

            .panel-title {
                font-size: 20px;
                margin-bottom: 24px;
            }

            .timer-preview {
                font-size: 48px;
                margin-bottom: 24px;
            }

            .time-inputs {
                gap: 12px;
                margin-bottom: 24px;
            }

            .time-input {
                width: 70px;
                padding: 14px;
                font-size: 20px;
                min-height: 50px;
            }

            .time-separator {
                font-size: 24px;
            }

            .buttons {
                grid-template-columns: 1fr 1fr;
                gap: 12px;
            }

            .btn {
                padding: 16px 20px;
                font-size: 16px;
                min-height: 50px;
                touch-action: manipulation;
            }

            .status {
                font-size: 16px;
                margin-top: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="control-panel">
        <h1 class="panel-title">Timer Control Panel</h1>
        
        <div class="timer-preview" id="timerPreview">00:00</div>
        
        <div class="time-inputs">
            <input type="number" class="time-input" id="minutesInput" min="0" max="99" value="0" placeholder="MM">
            <span class="time-separator">:</span>
            <input type="number" class="time-input" id="secondsInput" min="0" max="59" value="0" placeholder="SS">
        </div>

        <div class="buttons">
            <button class="btn btn-set" onclick="setTimer()">Set Time</button>
            <button class="btn btn-start" onclick="startTimer()">Start</button>
            <button class="btn btn-stop" onclick="stopTimer()">Stop</button>
            <button class="btn btn-reset" onclick="resetTimer()">Reset</button>
        </div>

        <div class="status" id="status">Status: STOPPED</div>
    </div>

    <script>
        const ws = new WebSocket('ws://' + window.location.host);
        
        let timerState = {
            isRunning: false,
            minutes: 0,
            seconds: 0
        };

        ws.onopen = () => {
            console.log('Connected to server');
        };

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            
            if (data.type === 'timerState' || data.type === 'timerUpdate') {
                timerState = data.state;
                updateDisplay();
            }
        };

        ws.onclose = () => {
            console.log('Disconnected from server');
        };

        ws.onerror = (error) => {
            console.error('WebSocket error:', error);
        };

        function updateDisplay() {
            const minutes = String(timerState.minutes).padStart(2, '0');
            const seconds = String(timerState.seconds).padStart(2, '0');
            const timerElement = document.getElementById('timerPreview');
            const statusElement = document.getElementById('status');
            
            timerElement.textContent = `${minutes}:${seconds}`;
            
            if (timerState.isRunning) {
                timerElement.classList.add('running');
                statusElement.textContent = 'Status: RUNNING';
            } else {
                timerElement.classList.remove('running');
                statusElement.textContent = 'Status: STOPPED';
            }
        }

        function startTimer() {
            ws.send(JSON.stringify({ type: 'start' }));
        }

        function stopTimer() {
            ws.send(JSON.stringify({ type: 'stop' }));
        }

        function resetTimer() {
            ws.send(JSON.stringify({ type: 'reset' }));
        }

        function setTimer() {
            const minutes = parseInt(document.getElementById('minutesInput').value) || 0;
            const seconds = parseInt(document.getElementById('secondsInput').value) || 0;
            ws.send(JSON.stringify({ type: 'setTimer', minutes, seconds }));
        }

        updateDisplay();
    </script>
</body>
</html>
